name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# This project is deployed from a droplet behind a Cloudflare Tunnel, NOT from
# GitHub Pages. This workflow only checks that the app lints and builds — it
# does not deploy. See DEPLOY.md.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
